services:
  postgres:
    image: postgres:16-alpine
    container_name: salao-beleza-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: salao
      POSTGRES_PASSWORD: salao123
      POSTGRES_DB: salao_beleza
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
